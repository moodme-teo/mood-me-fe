# PR/push 시 최소 품질 게이트. npm ci → format:check → lint → typecheck → build 순서로 실행.
# 로컬에서는 pre-commit(lint-staged)이 스테이징된 파일만 빠르게 검사하고, CI 는 전체를 검사한다.
# Node 버전은 .nvmrc(24) 기준.

name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
