<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>무드보드 조립 목업 — #41 구간 3 (최소 세트)</title>
    <style>
      :root {
        --gap: 40px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background: #2a2a2e;
        color: #e8e8ea;
        padding: 32px;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .sub {
        font-size: 13px;
        color: #a5a5ac;
        margin-bottom: 28px;
        line-height: 1.6;
      }
      .boards {
        display: flex;
        gap: var(--gap);
        flex-wrap: wrap;
        align-items: flex-start;
      }
      .col {
      }
      .cap {
        font-size: 13px;
        margin: 12px 2px 0;
        color: #cfcfd4;
      }
      .cap b {
        color: #fff;
      }
      .cap .tag {
        display: inline-block;
        font-size: 11px;
        color: #9a9aa2;
        margin-left: 6px;
      }
      /* stage */
      .stage {
        position: relative;
        width: 560px;
        height: 720px;
        overflow: hidden;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      }
      .el {
        position: absolute;
      }
      /* tile treatments */
      .tile img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .tile {
        border-radius: 2px;
      }
      .polaroid {
        background: #fff;
        padding: 10px 10px 34px;
        border-radius: 3px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
      }
      .polaroid .frameimg {
        width: 100%;
        height: 100%;
      }
      .thinframe {
        border: 3px solid #d8c9a0;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
      }
      .goldframe {
        border: 4px solid #c9a24b;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.55);
      }
      .soft {
        border-radius: 4px;
        box-shadow: 0 10px 26px rgba(120, 100, 90, 0.22);
      }
      .obj img {
        width: 100%;
        height: auto;
        display: block;
        filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.28));
      }
      .deco img {
        width: 100%;
        height: auto;
        display: block;
      }
      /* sticker phrase */
      .sticker {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .sticker img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .sticker span {
        position: relative;
        z-index: 1;
        padding: 0 10px;
      }
      .postit span {
        font-family: "Nanum Pen Script", cursive;
        font-size: 21px;
        color: #4a3f1e;
        transform: rotate(-3deg);
        line-height: 1.25;
      }
      .tapelabel span {
        font-size: 15px;
        letter-spacing: 1px;
        color: #5a4b2a;
        font-weight: 600;
      }
      .ticket span {
        font-size: 16px;
        letter-spacing: 2px;
        color: #6a5a38;
        font-weight: 700;
      }
      /* title card */
      .title {
        position: absolute;
        text-align: center;
        z-index: 30;
      }
      .title .yr {
        font-size: 46px;
        font-weight: 800;
        letter-spacing: 2px;
        line-height: 1;
      }
      .title .lb {
        font-size: 15px;
        letter-spacing: 6px;
        margin-top: 6px;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 10px;
        background: #3a3a40;
        color: #b9b9c0;
        margin-left: 6px;
        vertical-align: middle;
      }
      .note {
        margin-top: 22px;
        font-size: 12px;
        color: #8f8f97;
        max-width: 1180px;
        line-height: 1.7;
      }
      .note code {
        background: #3a3a40;
        padding: 1px 5px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>
      무드보드 조립 목업 <span class="badge">#41 구간 3 · 최소 세트</span>
    </h1>
    <p class="sub">
      생성 자산(타일 15 · 오브제 5 · 텍스처 1 · 스티커 3 · 데코 6)으로
      <b>페르소나 결이 다른 여정 3개</b>를 각각 다른
      <b>아키타입 × 톤 프리셋</b>으로 조립. 목적은 톤·프레임·데코의 결합이
      무드보드로 성립하는지 육안 판정. 문구는 Claude 출력 자리(placeholder),
      타일은 전부 AI 컷(히어로 = ★).
    </p>

    <div class="boards" id="boards"></div>

    <p class="note" id="note"></p>

    <script>
      const BASE = "../../../public/test-image";
      // 여정 3개. el: 타일/오브제/스티커/데코/타이틀. 좌표=stage(560x720) 기준 px, r=회전도.
      const BOARDS = [
        {
          key: "A",
          title: "여정 A · 코지 홈바디 × 코티지코어",
          arche: "보드판 아키타입",
          preset: "웜 크래프트 (t01 코르크)",
          bg: { texture: BASE + "/board-asset/texture/t01.jpg" },
          els: [
            {
              t: "tile",
              src: "b30",
              x: 150,
              y: 70,
              w: 230,
              r: -4,
              hero: true,
              style: "polaroid",
            },
            {
              t: "tile",
              src: "b78",
              x: 40,
              y: 200,
              w: 170,
              r: 6,
              style: "polaroid",
            },
            {
              t: "tile",
              src: "b80",
              x: 330,
              y: 250,
              w: 200,
              r: 5,
              style: "polaroid",
            },
            {
              t: "tile",
              src: "b32",
              x: 70,
              y: 400,
              w: 185,
              r: -5,
              style: "polaroid",
            },
            {
              t: "tile",
              src: "b77",
              x: 300,
              y: 470,
              w: 210,
              r: 3,
              style: "polaroid",
            },
            { t: "obj", src: "o01", x: 250, y: 360, w: 90, r: -8 },
            { t: "deco", src: "d17", x: 250, y: 60, w: 34, r: 0 }, // 압정
            { t: "deco", src: "d17", x: 420, y: 242, w: 34, r: 0 },
            { t: "deco", src: "d01", x: 60, y: 190, w: 90, r: -18 }, // 마스킹테이프
            {
              t: "sticker",
              kind: "postit",
              src: "s01",
              x: 360,
              y: 80,
              w: 120,
              h: 120,
              r: 6,
              text: "느긋하게",
            },
            {
              t: "sticker",
              kind: "tapelabel",
              src: "s06",
              x: 150,
              y: 620,
              w: 250,
              h: 56,
              r: -2,
              text: "오늘의 온기",
            },
          ],
        },
        {
          key: "B",
          title: "여정 B · 다크 아카데미아 × 커리어 보스",
          arche: "중앙 타이틀 방사형",
          preset: "다크 무디 (텍스처 없음 · CSS)",
          bg: {
            css: "radial-gradient(120% 100% at 50% 0%, #26232a 0%, #17151a 100%)",
          },
          els: [
            {
              t: "title",
              x: 180,
              y: 300,
              yr: "2026",
              lb: "M O O D  B O A R D",
              color: "#e7d9a8",
            },
            {
              t: "tile",
              src: "b23",
              x: 30,
              y: 40,
              w: 200,
              r: -3,
              style: "thinframe",
              hero: true,
            },
            {
              t: "tile",
              src: "b21",
              x: 360,
              y: 70,
              w: 175,
              r: 4,
              style: "thinframe",
            },
            {
              t: "tile",
              src: "b45",
              x: 20,
              y: 470,
              w: 210,
              r: 3,
              style: "thinframe",
            },
            {
              t: "tile",
              src: "b61",
              x: 340,
              y: 440,
              w: 200,
              r: -4,
              style: "thinframe",
            },
            {
              t: "tile",
              src: "b22",
              x: 360,
              y: 250,
              w: 180,
              r: 6,
              style: "goldframe",
            },
            { t: "obj", src: "o19", x: 60, y: 330, w: 150, r: -6 },
            { t: "obj", src: "o18", x: 230, y: 560, w: 120, r: 8 },
            {
              t: "sticker",
              kind: "ticket",
              src: "s05",
              x: 150,
              y: 60,
              w: 200,
              h: 88,
              r: -3,
              text: "깊이 있게",
            },
          ],
        },
        {
          key: "C",
          title: "여정 C · 페어리코어 × 네오 로맨틱",
          arche: "여백 스크랩북",
          preset: "소프트 파스텔 (텍스처 없음 · CSS)",
          bg: {
            css: "linear-gradient(160deg, #f6efe6 0%, #efe7ee 60%, #e9eef2 100%)",
          },
          els: [
            {
              t: "tile",
              src: "b35",
              x: 110,
              y: 60,
              w: 220,
              r: -5,
              hero: true,
              style: "soft",
            },
            {
              t: "tile",
              src: "b53",
              x: 340,
              y: 180,
              w: 180,
              r: 6,
              style: "soft",
            },
            {
              t: "tile",
              src: "b33",
              x: 40,
              y: 300,
              w: 190,
              r: 4,
              style: "soft",
            },
            {
              t: "tile",
              src: "b54",
              x: 300,
              y: 400,
              w: 210,
              r: -4,
              style: "soft",
            },
            {
              t: "tile",
              src: "b76",
              x: 90,
              y: 500,
              w: 185,
              r: 7,
              style: "soft",
            },
            { t: "deco", src: "d05", x: 300, y: 395, w: 220, r: -4 }, // 찢은 가장자리 프레임
            { t: "obj", src: "o04", x: 250, y: 250, w: 110, r: -10 }, // 나비
            { t: "obj", src: "o08", x: 360, y: 560, w: 90, r: 12 }, // 수정
            { t: "deco", src: "d11", x: 210, y: 150, w: 110, r: 8 }, // 화살표 낙서
            { t: "deco", src: "d12", x: 60, y: 110, w: 56, r: 0 }, // 별표 낙서
            {
              t: "sticker",
              kind: "postit",
              src: "s01",
              x: 372,
              y: 64,
              w: 142,
              h: 142,
              r: 5,
              text: "반짝이는 예감",
            },
            {
              t: "title",
              x: 26,
              y: 672,
              yr: "my 2026",
              lb: "",
              color: "#8a7f76",
              small: true,
            },
          ],
        },
      ];

      const stickerImg = {
        s01: "/board-asset/sticker/s01.svg",
        s05: "/board-asset/sticker/s05.svg",
        s06: "/board-asset/sticker/s06.svg",
      };

      function render() {
        const wrap = document.getElementById("boards");
        for (const b of BOARDS) {
          const col = document.createElement("div");
          col.className = "col";
          const stage = document.createElement("div");
          stage.className = "stage";
          if (b.bg.texture) {
            stage.style.background = `url(${b.bg.texture})`;
            stage.style.backgroundSize = "300px";
          } else stage.style.background = b.bg.css;

          for (const e of b.els) {
            const d = document.createElement("div");
            d.className = "el " + e.t;
            d.style.left = e.x + "px";
            d.style.top = e.y + "px";
            if (e.w) d.style.width = e.w + "px";
            if (e.r) d.style.transform = `rotate(${e.r}deg)`;

            if (e.t === "tile") {
              d.classList.add(e.style || "");
              const h =
                e.style === "polaroid"
                  ? Math.round(e.w * 1.0)
                  : e.style === "soft"
                    ? Math.round(e.w * 1.28)
                    : Math.round(e.w * 1.15);
              d.style.height = (e.style === "polaroid" ? h + 44 : h) + "px";
              const inner =
                e.style === "polaroid"
                  ? `<div class="frameimg" style="height:${h}px"><img src="${BASE}/board/${e.src}.jpg"></div>`
                  : `<img src="${BASE}/board/${e.src}.jpg" style="height:${h}px">`;
              d.innerHTML = inner;
              if (e.hero) d.title = "★ 히어로 = AI 컷";
            } else if (e.t === "obj") {
              d.classList.add("obj");
              d.innerHTML = `<img src="${BASE}/board-asset/object/${e.src}.png">`;
            } else if (e.t === "deco") {
              d.classList.add("deco");
              d.innerHTML = `<img src="${BASE}/board-asset/deco/${e.src}.svg">`;
            } else if (e.t === "sticker") {
              d.classList.add("sticker", e.kind);
              d.style.width = e.w + "px";
              d.style.height = e.h + "px";
              d.innerHTML = `<img src="${BASE}${stickerImg[e.src]}"><span>${e.text}</span>`;
            } else if (e.t === "title") {
              d.classList.add("title");
              d.style.color = e.color;
              const yrStyle = e.small
                ? "font-size:22px;font-weight:700;font-family:cursive"
                : "";
              d.innerHTML =
                `<div class="yr" style="${yrStyle}">${e.yr}</div>` +
                (e.lb ? `<div class="lb">${e.lb}</div>` : "");
            }
            stage.appendChild(d);
          }
          col.appendChild(stage);
          const cap = document.createElement("div");
          cap.className = "cap";
          cap.innerHTML = `<b>${b.title}</b><br><span class="tag">${b.arche} · ${b.preset}</span>`;
          col.appendChild(cap);
          wrap.appendChild(col);
        }
        document.getElementById("note").innerHTML =
          "판정 관점: ① 타일 5장이 톤 프리셋 안에서 서로 붙는가 ② 프레임/데코가 '편집 장치'로서 통일감을 만드는가 " +
          "③ 오브제 컷아웃(투명 PNG)이 액센트로 읽히는가 ④ 타이틀 카드 유무(A 없음 · B 있음 · C 소형)가 자연스러운가. " +
          "한계: 최소 세트라 <code>밀도 5장</code>(spec 10~20 미만) · B·C 텍스처 미수집(CSS 대체) · 오브제 book/crystal은 흰 halo(밝은 피사체 flood-fill 한계). " +
          "손글씨 폰트는 로컬 미설치 시 시스템 폰트로 대체됨.";
      }
      render();
    </script>
  </body>
</html>
